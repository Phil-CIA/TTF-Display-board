; CrowPanel Advance 4.3 HMI — PlatformIO Project
; Target: ESP32-S3-WROOM-1-N16R8 (16MB flash, 8MB PSRAM)
; Display: 800x480 IPS capacitive touch, ST7265 LCD driver
; PSU link: UART0-IN (IO43 TX, IO44 RX) at 115200 8N1

[env:crowpanel-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; PSRAM: OPI mode required for 8MB OctalRAM on N16R8
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions = huge_app.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; LVGL config — must come before lvgl headers
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_CONF_SUPPRESS_DEFINE_CHECK
    ; PSU UART port assignment (CrowPanel UART0-IN connector)
    -DPSU_UART_TX_PIN=43
    -DPSU_UART_RX_PIN=44
    -DPSU_UART_BAUD=115200
    ; Display geometry
    -DDISPLAY_WIDTH=800
    -DDISPLAY_HEIGHT=480

; Serial monitor — USB CDC port
monitor_speed = 115200
monitor_port = COM*

; Libraries
lib_deps =
    lvgl/lvgl @ ^9.2.0
    lovyan03/LovyanGFX @ ^1.1.16
